spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/regintel}
    username: ${DATABASE_USERNAME:regintel}
    password: ${DATABASE_PASSWORD:regintel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

logging:
  level:
    root: WARN
    com.regintel.ai: INFO
    org.hibernate.SQL: WARN
