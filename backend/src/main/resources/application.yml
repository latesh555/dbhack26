spring:
  application:
    name: regintel-ai
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.regintel.ai: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

regintel:
  api:
    version: v1
